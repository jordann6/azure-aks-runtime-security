name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret Scan (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2

  terraform:
    name: Terraform Validate + Format (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform -chdir=terraform fmt -check
      - name: Validate
        run: |
          terraform -chdir=terraform init -backend=false
          terraform -chdir=terraform validate

  kyverno:
    name: Kyverno Policy Tests (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Kyverno CLI
        run: |
          VERSION=v1.13.4
          curl -sSL "https://github.com/kyverno/kyverno/releases/download/${VERSION}/kyverno-cli_${VERSION}_linux_amd64.tar.gz" \
            | tar -xz kyverno
          sudo mv kyverno /usr/local/bin/
      - name: Run policy unit tests
        run: kyverno test k8s/kyverno/tests/

  checkov:
    name: Checkov IaC (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: true

  trivy:
    name: Trivy IaC + Kubernetes (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM
